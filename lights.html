<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luces</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Inter',sans-serif;
            margin:0;
            background:#fff;
            color:#333;
        }

        .widget-container{
            text-align:center;
            padding:15px;
            background:#f5f7ff;
        }

        header{
            background:#5988FF;
            color:white;
            text-align:center;
            padding:40px 20px;
        }

        ul{
            list-style:none;
            padding:0;
            margin:20px auto;
            max-width:400px;
        }

        .list__item{
            background:#eef2ff;
            margin:10px 0;
            padding:15px;
            border-radius:10px;
            transition:0.2s;
        }

        .list__item:hover{
            background:#dce3ff;
        }

        .item__img{
            width:50px;
            vertical-align:middle;
            margin-right:10px;
        }

        a{
            text-decoration:none;
            color:#333;
            font-size:18px;
            font-weight:600;
        }
    </style>
</head>

<body>

<header>
    <h1>Luces encendidas</h1>
</header>

<div class="widget-container">
    <h2>Selecciona la cantidad de lámparas</h2>

    <ul>
        <li class="list__item">
            <a href="{{ lights + '/2' }}">
                <img class="item__img" src="../static/img/light.svg" alt="light">
                <span>2 lámparas</span>
            </a>
        </li>

        <li class="list__item">
            <a href="{{ lights + '/4' }}">
                <img class="item__img" src="../static/img/light.svg" alt="light">
                <span>4 lámparas</span>
            </a>
        </li>

        <li class="list__item">
            <a href="{{ lights + '/6' }}">
                <img class="item__img" src="../static/img/light.svg" alt="light">
                <span>6 lámparas</span>
            </a>
        </li>

        <!-- 🌱 NUEVA TARJETA ECOLÓGICA -->
        <li class="list__item">
            <a href="{{ lights + '/1' }}">
                <img class="item__img" src="../static/img/battery.svg" alt="battery">
                <span>Iluminación ecológica</span>
            </a>
        </li>
    </ul>
</div>

</body>
</html>
